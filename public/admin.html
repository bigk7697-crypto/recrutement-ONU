<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/2/2f/Flag_of_the_United_Nations.svg">
    <title>Authentification Administrateur - Nations Unies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .un-blue { background-color: #009edb; }
        .text-un-blue { color: #009edb; }
        .border-un-blue { border-color: #009edb; }
        .hover-un-blue:hover { background-color: #0084ba; }
    </style>
</head>
<body class="bg-slate-900 flex flex-col justify-between min-h-screen">

    <!-- Top spacer -->
    <div></div>

    <!-- Login Box -->
    <main class="w-full max-w-md mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-800">
            <!-- Header banner with logo -->
            <div class="bg-slate-950 p-8 text-center border-b border-gray-100 flex flex-col items-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Flag_of_the_United_Nations.svg" alt="Drapeau de l'ONU" class="h-16 w-auto shadow rounded mb-4">
                <h1 class="text-white text-xl font-bold tracking-tight">Espace Administrateur Unique</h1>
                <p class="text-xs text-gray-500 uppercase font-semibold tracking-wider mt-1">Système de Recrutement ONU</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="p-8 space-y-6">
                <!-- Alerts -->
                <div id="alertBox" class="hidden p-4 rounded-lg bg-red-50 border border-red-100 text-red-700 text-xs flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation text-base"></i>
                    <span id="alertMsg">Identifiants incorrects.</span>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Identifiant / E-mail</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <input type="text" id="username" required placeholder="admin@un.org" class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-un-blue bg-gray-50 focus:bg-white transition">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider">Mot de passe</label>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-solid fa-key"></i>
                        </div>
                        <input type="password" id="password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-un-blue bg-gray-50 focus:bg-white transition">
                    </div>
                </div>

                <button type="submit" class="w-full py-3 rounded-lg font-bold un-blue hover-un-blue text-white shadow-lg transition duration-200 text-sm flex items-center justify-center">
                    <span id="loginSpinner" class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full mr-2 hidden"></span>
                    <i class="fa-solid fa-right-to-bracket mr-2"></i> Connexion Sécurisée
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-6 text-center text-xs text-slate-500">
        <p>© 2026 Organisation des Nations Unies. Accès strictement réservé aux personnes autorisées.</p>
        <p class="mt-1">Tout accès non autorisé sera enregistré et poursuivi.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Vérifier si déjà connecté
            try {
                const res = await fetch('/api/admin/verify');
                if (res.ok) {
                    window.location.href = '/dashboard';
                }
            } catch (e) {}

            document.getElementById('loginForm').addEventListener('submit', handleLogin);
        });

        async function handleLogin(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('button[type="submit"]');
            const spinner = document.getElementById('loginSpinner');
            const alertBox = document.getElementById('alertBox');
            
            submitBtn.disabled = true;
            spinner.classList.remove('hidden');
            alertBox.classList.add('hidden');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Connexion échouée.');
                }

                // Succès - redirection vers le tableau de bord
                window.location.href = '/dashboard';

            } catch (err) {
                document.getElementById('alertMsg').innerText = err.message;
                alertBox.classList.remove('hidden');
                submitBtn.disabled = false;
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
